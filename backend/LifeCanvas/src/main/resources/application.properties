spring.application.name=LifeCanvas
spring.datasource.url=jdbc:mysql://localhost:3306/lifecanvas
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

jwt.secret.key=thisisasecretkeyforthisprojectwhichisalongkey

spring.mail.host=<your-host-from-brevo>
spring.mail.port=587
spring.mail.username=<your-username>
spring.mail.password=<your-password>
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from= <your_email>
